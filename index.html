<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gel Electrophoresis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #020e0a 0%, #061a10 25%, #04120e 50%, #081e18 75%, #020e0a 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    overflow: hidden;
    position: relative;
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* Gel band strips at top and bottom */
  .gel-strip-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 18px,
      rgba(0,255,136,0.6) 18px, rgba(0,255,136,0.6) 30px,
      transparent 30px, transparent 55px,
      rgba(0,220,100,0.3) 55px, rgba(0,220,100,0.3) 62px,
      transparent 62px, transparent 90px
    );
    z-index: 10;
  }
  .gel-strip-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 20px,
      rgba(0,255,136,0.5) 20px, rgba(0,255,136,0.5) 34px,
      transparent 34px, transparent 58px,
      rgba(0,220,100,0.25) 58px, rgba(0,220,100,0.25) 68px,
      transparent 68px, transparent 95px
    );
    z-index: 10;
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 50px;
    max-width: 700px;
    width: 90%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(0, 255, 136, 0.12);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.4),
      0 0 60px rgba(0, 255, 136, 0.04),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    animation: cardFadeIn 1s ease-out;
  }
  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Gel icon */
  .icon {
    width: 88px;
    height: 96px;
    margin: 0 auto 32px;
    position: relative;
  }
  .gel-slab {
    width: 72px;
    height: 84px;
    margin: 0 auto;
    background: rgba(0, 40, 20, 0.7);
    border: 1.5px solid rgba(0, 255, 136, 0.25);
    border-radius: 7px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.08), inset 0 0 16px rgba(0,0,0,.4);
  }
  .gel-well-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    padding: 7px 10px 0;
  }
  .gel-well {
    width: 12px;
    height: 9px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 2px 2px 3px 3px;
  }
  .gel-band {
    position: absolute;
    left: 6px; right: 6px;
    height: 5px;
    border-radius: 3px;
    animation: bandPulse 2.5s ease-in-out infinite;
  }
  .gel-band.b1 { top: 26px; right: 22px; background: #00ff88;
    box-shadow: 0 0 10px #00ff88, 0 0 22px rgba(0,255,136,.4); animation-delay: 0s; }
  .gel-band.b2 { top: 40px; background: #00e87a;
    box-shadow: 0 0 10px #00e87a, 0 0 20px rgba(0,232,122,.35); animation-delay: .4s; }
  .gel-band.b3 { top: 54px; left: 18px; background: #00cc66;
    box-shadow: 0 0 8px #00cc66, 0 0 18px rgba(0,204,102,.3); animation-delay: .8s; }
  .gel-band.b4 { top: 67px; left: 26px; right: 20px; background: #00aa55;
    box-shadow: 0 0 7px #00aa55, 0 0 15px rgba(0,170,85,.25); animation-delay: 1.2s; }
  @keyframes bandPulse {
    0%, 100% { opacity: 0.75; }
    50%       { opacity: 1; box-shadow: inherit; filter: brightness(1.3); }
  }
  /* electrode line at bottom */
  .gel-slab::after {
    content: '';
    position: absolute;
    bottom: 3px; left: 4px; right: 4px;
    height: 2px;
    background: rgba(255, 100, 100, 0.35);
    border-radius: 1px;
  }

  /* Title */
  .title {
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #c8ffe0 0%, #7affc4 30%, #40ffaa 60%, #c8fff0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  /* Subtitle */
  .subtitle {
    font-size: 1.1rem;
    color: rgba(150, 220, 180, 0.65);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 42px;
    font-weight: 300;
  }

  /* CTA Button */
  .cta-btn {
    display: inline-block;
    padding: 16px 48px;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: #fff;
    text-decoration: none;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #0d7a45 0%, #0a9955 50%, #06c46a 100%);
    background-size: 200% 200%;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 20px rgba(0, 180, 90, 0.4);
    animation: btnGlow 3s ease-in-out infinite;
  }
  @keyframes btnGlow {
    0%, 100% { box-shadow: 0 4px 20px rgba(0, 180, 90, 0.4); }
    50%       { box-shadow: 0 4px 38px rgba(0, 220, 110, 0.6), 0 0 70px rgba(0, 180, 90, 0.15); }
  }
  .cta-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 40px rgba(0, 200, 100, 0.55);
  }
  .cta-btn:active { transform: translateY(-1px) scale(1.01); }
  .cta-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 200%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: rotate(25deg);
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { left: -60%; }
    50%       { left: 60%; }
  }
  .btn-arrow {
    display: inline-block;
    margin-left: 8px;
    transition: transform 0.3s ease;
  }
  .cta-btn:hover .btn-arrow { transform: translateX(4px); }

  /* Footer note */
  .footer-note {
    margin-top: 36px;
    font-size: 0.8rem;
    color: rgba(100, 180, 130, 0.35);
    letter-spacing: 1px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .card { padding: 40px 24px; }
    .title { font-size: 2.1rem; letter-spacing: 1px; }
    .subtitle { font-size: 0.88rem; letter-spacing: 2px; }
    .cta-btn { padding: 14px 36px; font-size: 0.95rem; }
    .icon { width: 68px; height: 76px; }
    .gel-slab { width: 56px; height: 68px; }
  }
</style>
</head>
<body>

<div class="gel-strip-top"></div>
<div class="gel-strip-bottom"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Main Card -->
<div class="card">
  <div class="icon">
    <div class="gel-slab">
      <div class="gel-well-row">
        <div class="gel-well"></div>
        <div class="gel-well"></div>
        <div class="gel-well"></div>
      </div>
      <div class="gel-band b1"></div>
      <div class="gel-band b2"></div>
      <div class="gel-band b3"></div>
      <div class="gel-band b4"></div>
    </div>
  </div>
  <h1 class="title">Gel Electrophoresis</h1>
  <p class="subtitle">Principle, Instrumentation &amp; Applications</p>
  <a href="simulation.html" class="cta-btn">
    Launch Simulator <span class="btn-arrow">&rarr;</span>
  </a>
  <p class="footer-note">Interactive 3D Simulation</p>
</div>

<script>
  (function() {
    var container = document.getElementById('particles');
    var colors = [
      'rgba(0,255,136,0.55)', 'rgba(0,200,100,0.45)', 'rgba(0,255,180,0.4)',
      'rgba(50,220,130,0.35)', 'rgba(0,180,80,0.4)',   'rgba(100,255,180,0.3)',
      'rgba(0,150,70,0.4)',   'rgba(0,255,100,0.45)'
    ];
    for (var i = 0; i < 32; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var size = Math.random() * 4 + 2;
      p.style.width  = size + 'px';
      p.style.height = size + 'px';
      p.style.left   = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (Math.random() * 10 + 8) + 's';
      p.style.animationDelay   = (Math.random() * 12) + 's';
      container.appendChild(p);
    }
  })();
</script>
</body>
</html>
